services:
  - type: web
    name: vyapari-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn run:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEMO_AUTH_ENABLED
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
