name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes

  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    env:
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Optional backend health check
        if: env.BACKEND_HEALTHCHECK_URL
        run: |
          for i in {1..20}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_HEALTHCHECK_URL")
            if [ "$status" -eq 200 ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Waiting for backend health endpoint (attempt $i/20)..."
            sleep 15
          done
          echo "Backend health check failed"
          exit 1
