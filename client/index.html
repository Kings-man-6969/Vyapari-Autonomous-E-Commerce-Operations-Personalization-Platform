<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vyapari — AI Commerce OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@500;600;700&display=swap" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function() {
        try {
          var t = localStorage.getItem('vyapari-theme');
          var d = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (d) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased selection:bg-primary/30 selection:text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
